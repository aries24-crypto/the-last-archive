<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Archive</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --text: #c4c4c4;
            --dim: #666;
            --border: #2a2a2a;
            --accent: #888;
            --serif: 'Crimson Pro', serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--serif);
            line-height: 1.6;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 400;
            letter-spacing: -0.02em;
            font-size: 2rem;
            color: var(--text);
            text-transform: lowercase;
            margin-bottom: 10px;
        }

        .subtitle {
            font-style: italic;
            color: var(--dim);
            font-size: 0.9rem;
        }

        #auth-section {
            border: 1px solid var(--border);
            padding: 30px;
            background: #181818;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-family: var(--mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: var(--dim);
        }

        input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            font-family: var(--serif);
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .auth-toggle {
            display: block;
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--dim);
            cursor: pointer;
            text-decoration: underline;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>The Last Archive</h1>
            <p class="subtitle">Identity is required for access.</p>
        </header>

        <div id="auth-section">
            <h2 id="auth-title" style="font-weight: 400; margin-bottom: 20px; text-align: center; font-size: 1.2rem;">Verification</h2>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="auth-email" placeholder="archivist@echoes.net">
            </div>
            <div class="input-group">
                <label>Access Code</label>
                <input type="password" id="auth-password" placeholder="••••••••">
            </div>
            <button id="auth-submit-btn" onclick="handleAuth()">Enter Archive</button>
            <span class="auth-toggle" id="auth-toggle-text" onclick="toggleAuthMode()">No record? Register here.</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabase.js"></script>

    <script>
        let isSignUp = false;

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? "Establish Record" : "Verification";
            document.getElementById('auth-submit-btn').innerText = isSignUp ? "Register" : "Enter Archive";
            document.getElementById('auth-toggle-text').innerText = isSignUp ? "Already recorded? Login." : "No record? Register here.";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('auth-submit-btn');
            
            if(!email || !password) return;

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                let result;
                if (isSignUp) {
                    result = await window.supabaseClient.auth.signUp({ email, password });
                } else {
                    result = await window.supabaseClient.auth.signInWithPassword({ email, password });
                }

                if (result.error) throw result.error;
                
                if (isSignUp) {
                    alert("Registration successful. You may now enter.");
                    toggleAuthMode();
                } else {
                    // Successful login: Redirect to archive.html
                    window.location.href = 'archive.html';
                }
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = isSignUp ? "Register" : "Enter Archive";
            }
        }

        async function checkSession() {
            const { data } = await window.supabaseClient.auth.getSession();
            if (data.session) {
                window.location.href = 'archive.html';
            }
        }

        window.onload = checkSession;
    </script>
</body>
</html>
